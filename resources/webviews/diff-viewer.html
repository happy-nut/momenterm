<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --mtm-darcula-editor:#2B2B2B;
  --mtm-darcula-gutter:#2B2B2B;
  --mtm-darcula-split:#3C3F41;
  --mtm-line-height:20px;
}
html,body,#editor{height:100%;background:var(--mtm-darcula-editor);overflow:hidden}
#loading{
  display:flex;align-items:center;justify-content:center;
  height:100%;color:#8C8C8C;font-family:-apple-system,sans-serif;font-size:13px;
}
/* IntelliJ Darcula density: flat editor surface, compact gutters, and no VS Code chrome shadows. */
.monaco-diff-editor,.monaco-editor,.monaco-editor-background,.monaco-editor .margin,
.monaco-editor .glyph-margin,.monaco-editor .margin-view-overlays,
.monaco-editor .minimap,.monaco-editor .decorationsOverviewRuler{
  background:var(--mtm-darcula-editor)!important;
}
.monaco-diff-editor .diffOverview,
.monaco-diff-editor .diffOverview .diffViewport,
.monaco-diff-editor .diffViewport,
.monaco-editor .decorationsOverviewRuler,
.monaco-editor .overviewRuler{
  display:none!important;width:0!important;min-width:0!important;border:0!important;background:transparent!important;
}
.monaco-scrollable-element>.scrollbar{background:transparent!important;box-shadow:none!important;}
.monaco-scrollable-element>.scrollbar.vertical{width:5px!important;right:1px!important;}
.monaco-scrollable-element>.scrollbar.horizontal{height:5px!important;}
.monaco-scrollable-element>.scrollbar>.slider{
  background:rgba(144,144,144,0.55)!important;border-radius:0!important;
}
.monaco-scrollable-element>.scrollbar.vertical>.slider{width:5px!important;left:0!important;}
.monaco-scrollable-element>.scrollbar.horizontal>.slider{height:5px!important;top:0!important;}
.monaco-editor .view-line,.monaco-editor .margin-view-overlays .line-numbers{
  line-height:var(--mtm-line-height)!important;
}
.monaco-editor .margin-view-overlays .line-numbers{
  color:#6E6E6E!important;font-size:12px!important;padding-right:4px!important;
}
.monaco-editor .margin-view-overlays .current-line~.line-numbers,
.monaco-editor .margin-view-overlays .active-line-number{
  color:#A9B7C6!important;
}
.monaco-diff-editor .editor.original{border-right:1px solid var(--mtm-darcula-split)!important;}
.monaco-diff-editor .editor.modified{border-left:1px solid #242424!important;}
/* The original editor's default far-left ruler fights IntelliJ's shared center gutter. */
.monaco-diff-editor .editor.original .margin-view-overlays .line-numbers{
  visibility:hidden!important;color:transparent!important;
}
.monaco-diff-editor .margin-view-overlays .line-numbers{
  visibility:hidden!important;color:transparent!important;
}
.monaco-editor .current-line{border:0!important;background:rgba(50,66,82,0.14)!important;}
.monaco-editor .cursors-layer .cursor{background-color:#A9B7C6!important;border-color:#A9B7C6!important;}
/* IntelliJ-style VCS tints stay visible but never read as selected text. */
.mtm-added-line{background-color:var(--mtm-add-line,rgba(41,68,54,0.16))!important;}
.mtm-deleted-line{background-color:var(--mtm-del-line,rgba(74,45,45,0.16))!important;}
.mtm-modified-line{background-color:var(--mtm-mod-line,rgba(43,58,82,0.20))!important;}
.monaco-editor .margin-view-overlays .mtm-added-edge{
  background:linear-gradient(to right,var(--mtm-add-edge,#629755) 0 2px,transparent 2px)!important;
}
.monaco-editor .margin-view-overlays .mtm-deleted-edge{
  background:linear-gradient(to right,var(--mtm-del-edge,#CC666E) 0 2px,transparent 2px)!important;
}
.monaco-editor .margin-view-overlays .mtm-modified-edge{
  background:linear-gradient(to right,var(--mtm-mod-edge,#6897BB) 0 2px,transparent 2px)!important;
}
.monaco-editor .margin-view-overlays .mtm-added-margin{background-color:var(--mtm-add-line,rgba(41,68,54,0.16))!important;}
.monaco-editor .margin-view-overlays .mtm-deleted-margin{background-color:var(--mtm-del-line,rgba(74,45,45,0.16))!important;}
.monaco-editor .margin-view-overlays .mtm-modified-margin{background-color:var(--mtm-mod-line,rgba(43,58,82,0.20))!important;}
.mtm-modified-token{background-color:var(--mtm-mod-token,rgba(104,151,187,0.20))!important;border-radius:0;}
.mtm-active-hunk-line{
  background-color:var(--mtm-active-hunk-line,rgba(44,64,75,0.18))!important;
}
.monaco-editor .margin-view-overlays .mtm-active-hunk-margin{background-color:var(--mtm-active-hunk-margin,rgba(44,64,75,0.18))!important;}
.monaco-editor .margin-view-overlays .mtm-active-hunk-gutter{
  background-color:transparent!important;
}
#mtm-center-gutter{
  position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:80;
  font-family:"JetBrains Mono","SF Mono",Menlo,Monaco,monospace;font-size:12px;
}
#mtm-center-gutter svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.mtm-center-line-number{
  position:absolute;height:var(--mtm-line-height);line-height:var(--mtm-line-height);
  color:#6E6E6E;white-space:pre;font-size:12px;
}
.mtm-center-line-number.old{text-align:right}
.mtm-center-line-number.new{text-align:left}
.mtm-center-line-number.active{color:#A9B7C6}
</style>
</head>
<body>
<div id="loading">Loading diff…</div>
<div id="editor" style="display:none"></div>

<script>
'use strict';
var _diffEditor=null,_loaded=false,_pending=null,_fontSize=13,_lineHeight=20;
var _centerGutterNode=null,_centerGutterSvg=null,_centerGutterRaf=0,_centerGutterWired=false;
var _bottomSpacerZoneIds={original:null,modified:null},_bottomSpacerSignature='';
var _authoritativeLineDiffs={original:[],modified:[]};
var _modifiedLineFill='rgba(43,58,82,0.20)',_activeLineFill='rgba(44,64,75,0.18)',_activeHunkEdge='#6897BB';

// Surface any hard failure on-screen instead of silently sitting on "Loading diff…".
window.onerror=function(message,source,lineno,colno){
  var el=document.getElementById('loading');
  if(el){el.style.display='flex';el.style.color='#f57c7c';
    el.textContent='JS error: '+message+' ('+lineno+':'+colno+')';}
  return false;
};
// This bundle ships only vs/editor/*, not vs/base/worker/, so Monaco cannot spawn its default
// language web worker. Route it to a tiny inline no-op worker — the side-by-side diff renders
// without the worker (only worker-backed extras like JSON schema validation are skipped).
window.MonacoEnvironment={getWorkerUrl:function(){
  return 'data:text/javascript;charset=utf-8,'+encodeURIComponent('self.onmessage=function(){};');
}};

// Review layer: the native side owns hunk/file navigation (it computes the target line and the
// "last hunk in file" pause), then tells Monaco where to place its blinking cursor. Arrow keys move
// the cursor natively inside the focused read-only split pane. Modified-side cursor moves are reported
// back so the native side can select/deselect the inline comment on that line.
var _reviewLine=1,_reviewEditorSide='modified',_suppressCursorReport=false,_lastHunkHintNode=null;

window.addEventListener('message',function(e){
  var msg=e.data;
  if(!msg||!msg.type)return;
  if(msg.type==='loadDiff')loadDiff(msg);
  else if(msg.type==='setFontSize')setFontSize(msg.fontSize);
  else if(msg.type==='setActiveHunk')setActiveHunk(msg);
  else if(msg.type==='setReviewCursor')setReviewCursor(msg.line);
  else if(msg.type==='focusReview')focusReview();
  else if(msg.type==='showLastHunkHint')showLastHunkHint(msg.text);
  else if(msg.type==='setComments')renderComments(msg.comments||[],msg.theme);
  else if(msg.type==='showCommentDraft')showCommentDraft(msg.kind||'question',msg.line||_reviewLine,msg.text||'',msg.id);
});

// The comment view zone reproduces the native NativeInlineReviewCommentBox: 6px radius, panelBackground
// fill, a 1px panelBorder that thickens to a 2px accent when the caret selects it, and a kind-colored
// "Question" / "Change request" title above the body. Colors arrive from the native theme (setComments),
// cached so plain re-renders (selection changes) keep them without another palette round-trip.
var _commentZoneIds=[],_commentTheme=null,_commentItems=[],_commentDraftZoneId=null,_commentDraftNode=null,_commentDraftLine=1,_commentDraftKind='question',_commentDraftEditId=null;
function renderComments(comments,theme){
  if(theme)_commentTheme=theme;
  _commentItems=(comments||[]).slice();
  var t=_commentTheme||{};
  var bg=t.boxBackground||'#262628',border=t.boxBorder||'#3a3a3a',selBorder=t.selectedBorder||'#4a9d5b';
  var qAccent=t.questionAccent||'#c8a24a',cAccent=t.changeAccent||'#4a9d5b',bodyColor=t.bodyText||'#e6e6e6';
  var ed=modifiedEditor();if(!ed)return;
  ed.changeViewZones(function(accessor){
    _commentZoneIds.forEach(function(id){accessor.removeZone(id);});
    _commentZoneIds=[];
    comments.forEach(function(c){
      if(_commentDraftEditId!==null&&String(c.id)===String(_commentDraftEditId))return;
      var isQ=c.kind==='question';
      var accent=isQ?qAccent:cAccent;
      var box=document.createElement('div');
      box.style.cssText='margin:3px 10px 8px 0;border-radius:6px;overflow:hidden;pointer-events:auto;'+
        'background:'+bg+';border:'+(c.selected?('2px solid '+selBorder):('1px solid '+border))+';'+
        'box-shadow:0 2px 8px rgba(0,0,0,0.28);font:13px -apple-system,sans-serif;';
      var head=document.createElement('div');
      head.style.cssText='padding:7px 10px 0;font:600 12px -apple-system,sans-serif;color:'+accent+';';
      head.textContent=isQ?'Question':'Change request';
      var body=document.createElement('div');
      body.style.cssText='padding:3px 10px 8px;white-space:pre-wrap;line-height:1.42;color:'+bodyColor+';';
      body.textContent=c.text||'';
      box.appendChild(head);box.appendChild(body);
      var wrap=document.createElement('div');wrap.appendChild(box);
      var id=accessor.addZone({
        afterLineNumber:Math.max(0,+c.line||1),
        heightInPx:Math.max(48,30+(String(c.text||'').split('\n').length)*18),
        domNode:wrap
      });
      _commentZoneIds.push(id);
    });
  });
}

function removeCommentDraft(refocus){
  var ed=modifiedEditor();
  if(ed&&_commentDraftZoneId){
    ed.changeViewZones(function(accessor){accessor.removeZone(_commentDraftZoneId);});
  }
  _commentDraftZoneId=null;
  _commentDraftNode=null;
  _commentDraftEditId=null;
  if(_commentItems.length)renderComments(_commentItems);
  if(refocus)focusReview();
}

function commentThemeColors(){
  var t=_commentTheme||{};
  return {
    bg:t.boxBackground||'#262628',
    border:t.boxBorder||'#3a3a3a',
    selected:t.selectedBorder||'#4a9d5b',
    question:t.questionAccent||'#c8a24a',
    change:t.changeAccent||'#4a9d5b',
    body:t.bodyText||'#e6e6e6'
  };
}

function stopCommentUiEvent(e){
  if(!e)return;
  e.stopPropagation();
  if(e.stopImmediatePropagation)e.stopImmediatePropagation();
}

function showCommentDraft(kind,line,text,editId){
  var ed=modifiedEditor();if(!ed)return;
  removeCommentDraft(false);
  _commentDraftKind=kind||'question';
  _commentDraftLine=Math.max(1,+line||_reviewLine||1);
  _commentDraftEditId=(editId===undefined||editId===null)?null:editId;
  if(_commentItems.length)renderComments(_commentItems);
  var colors=commentThemeColors();
  var isQ=_commentDraftKind==='question';
  var accent=isQ?colors.question:colors.change;
  var box=document.createElement('div');
  box.className='mtm-comment-draft';
  box.style.cssText='margin:3px 10px 8px 0;border-radius:6px;overflow:hidden;pointer-events:auto;'+
    'background:'+colors.bg+';border:2px solid '+accent+';'+
    'box-shadow:0 4px 14px rgba(0,0,0,0.32);font:13px -apple-system,sans-serif;';
  ['keydown','keyup','keypress','mousedown','mouseup','click','pointerdown','pointerup'].forEach(function(name){
    box.addEventListener(name,function(e){
      if(name==='keydown'&&handleCommentDraftKeydown(e))return;
      stopCommentUiEvent(e);
    },false);
  });
  var head=document.createElement('div');
  head.style.cssText='display:flex;align-items:center;gap:10px;padding:7px 10px 0;';
  var title=document.createElement('div');
  title.textContent=isQ?'Question':'Change request';
  title.style.cssText='font:600 12px -apple-system,sans-serif;color:'+accent+';';
  var hint=document.createElement('div');
  hint.textContent='Cmd+Enter';
  hint.style.cssText='margin-left:auto;font:12px "JetBrains Mono","SF Mono",monospace;color:#8c8c8c;';
  var close=document.createElement('button');
  close.type='button';close.textContent='×';
  close.style.cssText='width:20px;height:20px;border:0;background:transparent;color:#aaa;font:16px -apple-system,sans-serif;cursor:pointer;';
  close.onclick=function(e){stopCommentUiEvent(e);removeCommentDraft(true);};
  head.appendChild(title);head.appendChild(hint);head.appendChild(close);
  var textarea=document.createElement('textarea');
  textarea.placeholder=isQ?'무엇이 궁금한가요?':'무엇을 바꿔야 하나요?';
  textarea.value=text||'';
  textarea.style.cssText='display:block;width:calc(100% - 16px);height:58px;margin:6px 8px 0;resize:none;'+
    'border:0;outline:none;border-radius:4px;padding:7px 8px;background:#1e1e1e;color:'+colors.body+';'+
    'font:13px/1.42 -apple-system,sans-serif;';
  textarea.addEventListener('keydown',function(e){
    if(handleCommentDraftKeydown(e))return;
    stopCommentUiEvent(e);
  },true);
  var actions=document.createElement('div');
  actions.style.cssText='display:flex;justify-content:flex-end;gap:8px;padding:7px 8px 8px;';
  var cancel=document.createElement('button');
  cancel.type='button';cancel.textContent='Cancel';
  cancel.style.cssText='border:1px solid '+colors.border+';background:transparent;color:'+colors.body+';border-radius:5px;padding:4px 10px;font:600 12px -apple-system,sans-serif;cursor:pointer;';
  cancel.onclick=function(e){stopCommentUiEvent(e);removeCommentDraft(true);};
  var save=document.createElement('button');
  save.type='button';save.textContent='Add';
  save.style.cssText='border:1px solid '+accent+';background:'+accent+';color:#111;border-radius:5px;padding:4px 12px;font:700 12px -apple-system,sans-serif;cursor:pointer;';
  save.onclick=function(e){stopCommentUiEvent(e);submitCommentDraft();};
  actions.appendChild(cancel);actions.appendChild(save);
  box.appendChild(head);box.appendChild(textarea);box.appendChild(actions);
  _commentDraftNode=box;
  ed.changeViewZones(function(accessor){
    _commentDraftZoneId=accessor.addZone({
      afterLineNumber:_commentDraftLine,
      heightInPx:132,
      domNode:box
    });
  });
  ed.revealLineInCenterIfOutside(_commentDraftLine);
  setTimeout(function(){textarea.focus();textarea.select();},0);
  setTimeout(function(){textarea.focus();},50);
}

function submitCommentDraft(){
  if(!_commentDraftNode)return;
  var field=_commentDraftNode.querySelector('textarea');
  var text=(field&&field.value||'').trim();
  postToNative('reviewComment',{kind:_commentDraftKind,line:_commentDraftLine,text:text,id:_commentDraftEditId});
  removeCommentDraft(true);
}

function handleCommentDraftKeydown(e){
  if(e.key==='Escape'){
    removeCommentDraft(true);
    e.preventDefault();e.stopPropagation();return true;
  }
  if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){
    submitCommentDraft();
    e.preventDefault();e.stopPropagation();return true;
  }
  return false;
}

function postToNative(name,payload){
  try{
    if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers[name]){
      window.webkit.messageHandlers[name].postMessage(payload||{});
    }
  }catch(_){}
}

function modifiedEditor(){return _diffEditor?_diffEditor.getModifiedEditor():null;}
function editorForSide(side){
  if(!_diffEditor)return null;
  return side==='original'?_diffEditor.getOriginalEditor():_diffEditor.getModifiedEditor();
}

// Code-navigation shortcuts (Cmd+B find usages, Cmd+↓ go to declaration) read the identifier under
// whichever split pane holds focus, then bridge it to the native side. Monaco owns keyboard focus so
// these never reach the app's Swift key monitor — they must be caught here.
function focusedDiffEditorSide(){
  if(!_diffEditor)return 'modified';
  var o=_diffEditor.getOriginalEditor(),m=_diffEditor.getModifiedEditor();
  if(o&&o.hasTextFocus&&o.hasTextFocus())return 'original';
  if(m&&m.hasTextFocus&&m.hasTextFocus())return 'modified';
  return _reviewEditorSide||'modified';
}
function focusedDiffEditor(){
  return editorForSide(focusedDiffEditorSide())||modifiedEditor();
}
function wordAtCursor(ed){
  if(!ed)return '';
  var pos=ed.getPosition();if(!pos)return '';
  var model=ed.getModel();if(!model)return '';
  var w=model.getWordAtPosition(pos);
  return (w&&w.word)?w.word:'';
}

function setReviewCursor(line){
  // Remember the target even if the editor hasn't finished its async load yet; it's re-applied from
  // the load callback so the very first navigation isn't dropped.
  _reviewLine=Math.max(1,+line||1);
  var ed=modifiedEditor();if(!ed)return;
  _reviewEditorSide='modified';
  _suppressCursorReport=true;
  ed.setPosition({lineNumber:_reviewLine,column:1});
  ed.revealLineInCenter(_reviewLine);
  ed.focus();
  _suppressCursorReport=false;
}

function focusReview(){
  var ed=editorForSide(_reviewEditorSide)||modifiedEditor();if(!ed)return;
  ed.focus();
  if(_reviewEditorSide==='modified')ed.setPosition({lineNumber:_reviewLine,column:1});
}

function showLastHunkHint(text){
  var host=document.getElementById('editor');if(!host)return;
  if(_lastHunkHintNode&&_lastHunkHintNode.parentNode)_lastHunkHintNode.parentNode.removeChild(_lastHunkHintNode);
  var ed=modifiedEditor();
  var top='50%';
  if(ed){
    try{
      var t=ed.getTopForLineNumber(_reviewLine);
      var st=ed.getScrollTop();
      top=Math.max(8,(t-st)+ed.getOption(monaco.editor.EditorOption.lineHeight)+4)+'px';
    }catch(_){}
  }
  var n=document.createElement('div');
  n.textContent=text||'이 파일의 마지막 변경입니다 · F7 한 번 더 → 다음 파일';
  n.style.cssText='position:absolute;left:50%;top:'+top+';transform:translateX(-50%);'+
    'background:rgba(30,30,30,0.94);color:#e6e6e6;border:1px solid rgba(255,255,255,0.12);'+
    'border-radius:9px;padding:7px 13px;font:600 12px -apple-system,sans-serif;'+
    'box-shadow:0 6px 20px rgba(0,0,0,0.4);z-index:140;pointer-events:none;'+
    'opacity:0;transition:opacity 0.18s ease';
  host.appendChild(n);
  _lastHunkHintNode=n;
  requestAnimationFrame(function(){n.style.opacity='1';});
  setTimeout(function(){
    if(n!==_lastHunkHintNode)return;
    n.style.opacity='0';
    setTimeout(function(){if(n.parentNode)n.parentNode.removeChild(n);if(n===_lastHunkHintNode)_lastHunkHintNode=null;},220);
  },1900);
}

function setFontSize(size){
  size=+size; if(!size)return;
  _fontSize=Math.max(12.5,size);
  document.documentElement.style.setProperty('--mtm-line-height',_lineHeight+'px');
  if(_diffEditor){
    _diffEditor.updateOptions({fontSize:_fontSize,lineHeight:_lineHeight});
    _bottomSpacerSignature='';
    balanceBottomScrollSpacers();
  }
}

// IntelliJ Darcula, matching the native panes' syntax + diff palette so the hybrid diff reads the same
// as the rest of the app (keyword #CC7832, string #6A8759, number #6897BB, comment #808080, annotation
// #BBB529 on IntelliJ Darcula #2B2B2B / #A9B7C6; diff add #294436, delete #4A2D2D).
var _themeDefined=false;
function defineDarculaTheme(){
  if(_themeDefined||typeof monaco==='undefined')return;
  _themeDefined=true;
  monaco.editor.defineTheme('momenterm-darcula',{
    base:'vs-dark',inherit:true,
    rules:[
      {token:'',foreground:'A9B7C6'},
      {token:'keyword',foreground:'CC7832'},
      {token:'keyword.control',foreground:'CC7832'},
      {token:'storage',foreground:'CC7832'},
      {token:'storage.type',foreground:'CC7832'},
      {token:'keyword.operator',foreground:'A9B7C6'},
      {token:'string',foreground:'6A8759'},
      {token:'string.escape',foreground:'CC7832'},
      {token:'number',foreground:'6897BB'},
      {token:'constant',foreground:'6897BB'},
      {token:'constant.numeric',foreground:'6897BB'},
      {token:'constant.language',foreground:'CC7832'},
      {token:'comment',foreground:'808080',fontStyle:'italic'},
      {token:'annotation',foreground:'BBB529'},
      {token:'metatag',foreground:'BBB529'},
      {token:'meta.tag',foreground:'BBB529'},
      {token:'attribute.name',foreground:'BBB529'},
      {token:'attribute.value',foreground:'6A8759'},
      {token:'tag',foreground:'CC7832'},
      {token:'type',foreground:'A9B7C6'},
      {token:'type.identifier',foreground:'A9B7C6'},
      {token:'identifier',foreground:'A9B7C6'},
      {token:'delimiter',foreground:'A9B7C6'},
      {token:'function',foreground:'FFC66D'},
      {token:'variable',foreground:'A9B7C6'}
    ],
    colors:{
      'editor.background':'#2B2B2B',
      'editor.foreground':'#A9B7C6',
      'editorLineNumber.foreground':'#606366',
      'editorLineNumber.activeForeground':'#A4A3A3',
      'editorCursor.foreground':'#A9B7C6',
      'editor.selectionBackground':'#214283',
      'editor.lineHighlightBackground':'#323232',
      'editor.lineHighlightBorder':'#00000000',
      'editorGutter.background':'#2B2B2B',
      'editorGutter.modifiedBackground':'#6897BB',
      'editorGutter.addedBackground':'#629755',
      'editorGutter.deletedBackground':'#CC666E',
      'scrollbarSlider.background':'#5E5E5E99',
      'scrollbarSlider.hoverBackground':'#6B6B6BCC',
      'scrollbarSlider.activeBackground':'#7A7A7ADD',
      'editorOverviewRuler.border':'#00000000',
      'diffEditor.insertedTextBackground':'#00000000',
      'diffEditor.removedTextBackground':'#00000000',
      'diffEditor.insertedLineBackground':'#29443622',
      'diffEditor.removedLineBackground':'#4A2D2D22',
      'diffEditor.diagonalFill':'#3C3F41',
      'diffEditorGutter.insertedLineBackground':'#29443633',
      'diffEditorGutter.removedLineBackground':'#4A2D2D33'
    }
  });
}

function hexToRgba(hex,a){
  hex=(hex||'').replace('#','');
  if(hex.length!==6)return 'rgba(104,151,187,'+a+')';
  var r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
  if(isNaN(r)||isNaN(g)||isNaN(b))return 'rgba(104,151,187,'+a+')';
  return 'rgba('+r+','+g+','+b+','+a+')';
}
// The blue "modified" background/token colors come from the native theme so the hybrid diff matches
// the native diff pane. Applied as CSS variables the decoration classes read.
function applyModifiedDiffColors(msg){
  var root=document.documentElement.style;

      if(p){
        _diffEditor=monaco.editor.createDiffEditor(document.getElementById('editor'),{
          theme:'momenterm-darcula',readOnly:true,
          minimap:{enabled:false},scrollBeyondLastLine:false,
          fontSize:_fontSize,lineHeight:_lineHeight,
          fontFamily:"'JetBrains Mono','SF Mono',Menlo,Monaco,monospace",
          renderSideBySide:true,automaticLayout:true,
          contextmenu:false,
          diffWordWrap:'off',
          glyphMargin:false,folding:false,lineDecorationsWidth:4,lineNumbersMinChars:4,
          overviewRulerBorder:false,overviewRulerLanes:0,hideCursorInOverviewRuler:true,renderLineHighlight:'all',
          renderIndicators:false,renderMarginRevertIcon:false,
          renderWhitespace:'none',roundedSelection:false,
          // Review cursor: a read-only editor still shows and blinks a caret when focused, and arrow
          // keys move it — that's the diff-view cursor the native side positions on each hunk.
          cursorBlinking:'blink',cursorStyle:'line',
          scrollbar:{verticalScrollbarSize:5,horizontalScrollbarSize:5,verticalSliderSize:5,horizontalSliderSize:5,useShadows:false,alwaysConsumeMouseWheel:false}
        });
        // onDidUpdateDiff fires after each diff computation (initial load + every setModel), which is
        // the only point getLineChanges() is valid — repaint the blue "modified" overlay + rebuild the
        // center line-number gutter there.
        _diffEditor.onDidUpdateDiff(onDiffUpdated);
        _diffEditor.setModel({
          original:monaco.editor.createModel(p.original,mapLang(p.lang)),
          modified:monaco.editor.createModel(p.modified,mapLang(p.lang))
        });
        resetBottomScrollSpacers();
        wireCenterGutterRepaint();
        wireReviewCursor();
        balanceBottomScrollSpacers();
        scheduleDiffRepaint();
        setReviewCursor(_reviewLine);
      }
    },function(err){
      var el=document.getElementById('loading');
      el.style.display='flex';el.style.color='#f57c7c';
      el.textContent='require failed: '+(err&&(err.message||String(err))||'unknown');
    });
  };
  document.head.appendChild(s);
}

function updateDiff(original,modified,lang){
  if(!_diffEditor){loadDiff({original:original,modified:modified,language:lang});return;}
  var oldModel=_diffEditor.getModel();
  var mLang=mapLang(lang);
  var newOriginal=monaco.editor.createModel(original,mLang);
  var newModified=monaco.editor.createModel(modified,mLang);
  _diffEditor.setModel({original:newOriginal,modified:newModified});
  if(oldModel){oldModel.original.dispose();oldModel.modified.dispose();}
  resetBottomScrollSpacers();
  wireCenterGutterRepaint();
  wireReviewCursor();
  balanceBottomScrollSpacers();
  scheduleDiffRepaint();
}

var _cursorWired=false;
function wireReviewCursor(){
  if(!_diffEditor||_cursorWired)return;
  _cursorWired=true;
  [['original',_diffEditor.getOriginalEditor()],['modified',_diffEditor.getModifiedEditor()]].forEach(function(pair){
    var side=pair[0],ed=pair[1];if(!ed)return;
    ed.onDidFocusEditorText(function(){_reviewEditorSide=side;});
    ed.onDidChangeCursorPosition(function(ev){
      _reviewEditorSide=side;
      if(side==='modified')_reviewLine=ev.position.lineNumber;
      if(ed.revealLineInCenterIfOutside)ed.revealLineInCenterIfOutside(ev.position.lineNumber);
      scheduleCenterGutterRepaint();
      if(_suppressCursorReport||side!=='modified')return;
      postToNative('reviewCursorMoved',{line:_reviewLine});
    });
  });
}

// Monaco holds keyboard focus for the blinking cursor, so review shortcuts that the native side owns
// (hunk/file navigation, leaving comments, deleting the selected comment) are forwarded from here.
// Arrow keys are intentionally left to Monaco (native cursor movement, reported via onDidChangeCursorPosition).
document.addEventListener('keydown',function(e){
  if(!_diffEditor)return;
  if(_commentDraftNode&&_commentDraftNode.contains(e.target)){
    handleCommentDraftKeydown(e);
    stopCommentUiEvent(e);
    return;
  }
  if(e.metaKey&&(e.key==='b'||e.key==='B')){         // Cmd+B → find usages of the symbol under the cursor
    var wb=wordAtCursor(focusedDiffEditor());
    if(wb)postToNative('findUsages',{word:wb});
    e.preventDefault();e.stopPropagation();return;
  }
  if(e.metaKey&&(e.key==='ArrowDown'||e.keyCode===40)){ // Cmd+↓ → go to the declaration of the symbol
    var wd=wordAtCursor(focusedDiffEditor());
    if(wd)postToNative('goToDeclaration',{word:wd});
    e.preventDefault();e.stopPropagation();return;
  }
  if(e.key==='Tab'&&e.shiftKey){                     // Shift+Tab → switch between the split panes
    var orig=_diffEditor.getOriginalEditor(),mod=_diffEditor.getModifiedEditor();
    if(orig&&orig.hasTextFocus()){_reviewEditorSide='modified';mod.focus();}else{_reviewEditorSide='original';orig.focus();}
    e.preventDefault();e.stopPropagation();return;
  }
  if(e.key==='F7'||e.keyCode===118){                 // F7 / Shift+F7 → next / previous hunk
    postToNative('reviewNavigate',{delta:e.shiftKey?-1:1});
    e.preventDefault();e.stopPropagation();return;
  }
  if(e.shiftKey&&(e.key==='?'||e.key==='/')){         // Shift+? → question comment
    showCommentDraft('question',_reviewLine);
    e.preventDefault();e.stopPropagation();return;
  }
  if(e.shiftKey&&(e.key==='>'||e.key==='.')){         // Shift+> → change/fix comment
    showCommentDraft('change',_reviewLine);
    e.preventDefault();e.stopPropagation();return;
  }
  if(!e.metaKey&&!e.ctrlKey&&!e.altKey&&!e.shiftKey&&(e.key==='e'||e.key==='E')){
    postToNative('reviewEditComment',{line:_reviewLine});
    e.preventDefault();e.stopPropagation();return;
  }
  if(e.key==='Backspace'){                            // delete the comment selected at the cursor
    postToNative('reviewDeleteComment',{line:_reviewLine});
    e.preventDefault();e.stopPropagation();return;
  }
},true);

var LANG={
  swift:'swift',js:'javascript',javascript:'javascript',jsx:'javascript',
  ts:'typescript',typescript:'typescript',tsx:'typescript',
  py:'python',python:'python',rs:'rust',rust:'rust',
  go:'go',java:'java',kt:'kotlin',kotlin:'kotlin',scala:'scala',
  c:'c',cpp:'cpp',cc:'cpp',cxx:'cpp',h:'cpp',hpp:'cpp',
  cs:'csharp',css:'css',scss:'scss',less:'less',
  html:'html',xml:'xml',svg:'xml',json:'json',
  yaml:'yaml',yml:'yaml',toml:'ini',ini:'ini',
  sh:'shell',bash:'shell',zsh:'shell',
  sql:'sql',rb:'ruby',ruby:'ruby',php:'php',
  dart:'dart',lua:'lua',dockerfile:'dockerfile',makefile:'makefile',
  md:'markdown',markdown:'markdown',mdx:'markdown',
  txt:'plaintext',text:'plaintext',log:'plaintext'
};
function mapLang(l){return LANG[l]||'plaintext';}
</script>
