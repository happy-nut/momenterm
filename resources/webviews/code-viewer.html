<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:transparent;overflow:hidden}
#root{display:flex;flex-direction:row;width:100%;height:100%}
#editor{height:100%;flex:1 1 100%;display:none;min-width:0}
#split{flex:0 0 1px;width:1px;background:var(--border,#3a3a3a);display:none}
#preview{height:100%;flex:1 1 100%;display:none;min-width:0;position:relative}
#md-view{
  width:100%;height:100%;overflow-y:auto;padding:24px 32px;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:14px;line-height:1.7;
  color:var(--fg,#d4d4d4);background:var(--bg,#1e1e1e)
}
#img-view{
  width:100%;height:100%;display:none;align-items:center;justify-content:center;
  background:var(--bg-dark,#141414)
}
#img-view img{max-width:100%;max-height:100%;object-fit:contain}
/* Source-line caret: every top-level block carries a transparent left rail; the block matching
   the current source line lights it with the accent and a faint tint. */
.md-block{border-left:3px solid transparent;padding-left:11px;margin:0}
.md-block.md-caret{border-left-color:var(--accent,#4da1f5);background:var(--caret-bg,rgba(77,161,245,.10))}
#md-view h1,#md-view h2{border-bottom:1px solid var(--border,#3a3a3a);padding-bottom:.3em;margin-bottom:.6em;margin-top:1.2em}
#md-view h1{font-size:1.8em}#md-view h2{font-size:1.4em}
#md-view h3,#md-view h4,#md-view h5,#md-view h6{margin:.8em 0 .4em;font-weight:600}
#md-view p{margin:.6em 0}
#md-view code{background:var(--code-bg,#2a2a2a);padding:.1em .4em;border-radius:3px;font-family:monospace;font-size:.88em}
#md-view pre{background:var(--code-bg,#2a2a2a);padding:12px;border-radius:6px;overflow-x:auto;margin:.8em 0}
#md-view pre code{background:none;padding:0}
#md-view blockquote{border-left:3px solid var(--accent,#4da1f5);padding-left:12px;color:var(--secondary,#888);margin:.8em 0}
#md-view table{border-collapse:collapse;width:100%;margin:.8em 0}
#md-view th,#md-view td{border:1px solid var(--border,#3a3a3a);padding:6px 12px;text-align:left}
#md-view th{background:var(--code-bg,#2a2a2a);font-weight:600}
#md-view ul,#md-view ol{padding-left:1.6em;margin:.6em 0}
#md-view li{margin:.2em 0}
#md-view hr{border:none;border-top:1px solid var(--border,#3a3a3a);margin:1.2em 0}
#md-view img{max-width:100%;border-radius:4px}
#md-view a{color:var(--accent,#4da1f5);text-decoration:none}
#md-view a:hover{text-decoration:underline}
#md-view li.task-list-item{list-style:none;margin-left:-1.4em}
#md-view input[type=checkbox]{margin-right:6px}
#md-view .plain-view{margin:0;padding:0;background:none;font-family:'SF Mono',Menlo,Monaco,monospace;font-size:12px;white-space:pre;line-height:1.6}
</style>
<!-- Load marked eagerly, BEFORE Monaco's AMD loader ever defines `define`. marked's UMD attaches
     to `window` only when no AMD `define` is present; if Monaco loads first (raw/side mode), marked
     registers as an anonymous AMD module instead and `window.marked` stays undefined — which blanked
     the rendered/side markdown preview. Loading it here guarantees the global. -->
<script src="./marked.min.js"></script>
</head>
<body>
<div id="root">
  <div id="editor"></div>
  <div id="split"></div>
  <div id="preview">
    <div id="md-view"></div>
    <div id="img-view"><img id="img-el" alt=""></div>
  </div>
</div>

<script>
'use strict';
var _editor=null,_markedLoaded=false,_monacoLoaded=false;
var _pendingMonaco=null,_pendingMarked=null;
// Current file state (last loadFile).
var _content='',_lang='',_rawLang='',_viewMode='raw',_rendered=null,_isImage=false,_fontSize=11.5;
// Source-line caret state for the rendered/side preview.
var _blockLines=[],_currentLine=1,_suppressMonacoSync=false;

window.addEventListener('message',function(e){
  var msg=e.data;
  if(!msg||!msg.type)return;
  if(msg.type==='loadFile')loadFile(msg);
  else if(msg.type==='setTheme')applyTheme(msg.theme);
  else if(msg.type==='setFontSize')setFontSize(msg.fontSize);
});

function setFontSize(size){
  size=+size; if(!size)return;
  _fontSize=size;
  if(_editor)_editor.updateOptions({fontSize:_fontSize});
}

function applyTheme(t){
  if(!t)return;
  var r=document.documentElement.style;
  r.setProperty('--bg',t.bg||'#1e1e1e');
  r.setProperty('--fg',t.fg||'#d4d4d4');
  r.setProperty('--bg-dark',t.bgDark||'#141414');
  r.setProperty('--accent',t.accent||'#4da1f5');
  r.setProperty('--border',t.border||'#3a3a3a');
  r.setProperty('--code-bg',t.codeBg||'#2a2a2a');
  r.setProperty('--secondary',t.secondary||'#888');
  if(window.monaco&&_editor&&t.monacoTheme)monaco.editor.setTheme(t.monacoTheme);
}

// ---- layout -------------------------------------------------------------

function el(id){return document.getElementById(id);}

function applyLayout(){
  var showEditor=(_viewMode==='raw'||_viewMode==='side');
  var showPreview=(_viewMode==='rendered'||_viewMode==='side');
  el('editor').style.display=showEditor?'block':'none';
  el('editor').style.flexBasis=(_viewMode==='side')?'50%':'100%';
  el('preview').style.display=showPreview?'block':'none';
  el('preview').style.flexBasis=(_viewMode==='side')?'50%':'100%';
  el('split').style.display=(_viewMode==='side')?'block':'none';
  // Inside the preview column, show the image for image-backed files, else the markdown/plain view.
  var imgBacked=!!_rendered;
  el('img-view').style.display=(showPreview&&imgBacked)?'flex':'none';
  el('md-view').style.display=(showPreview&&!imgBacked)?'block':'none';
  if(_editor&&showEditor){ try{_editor.layout();}catch(e){} }
}

// ---- loading ------------------------------------------------------------

function loadFile(msg){
  _content=msg.content||'';
  _lang=(msg.language||'').toLowerCase();
  _rawLang=(msg.rawLanguage||_lang||'').toLowerCase();
  _viewMode=msg.viewMode||'raw';
  _rendered=msg.rendered||null;
  _isImage=!!msg.isImage;
  if(msg.fontSize)_fontSize=+msg.fontSize;
  if(_editor)_editor.updateOptions({fontSize:_fontSize});
  if(msg.theme)applyTheme(msg.theme);
  _currentLine=Math.max(1,+msg.cursorLine||1);

  // Pure image (no raw text): just show it, ignore modes.
  if(_isImage){
    _rendered=_content; _viewMode='rendered';
    el('img-el').src=_content;
    applyLayout();
    return;
  }

  // Editor pane (raw source) is needed for raw and side.
  if(_viewMode==='raw'||_viewMode==='side'){
    ensureMonaco(function(){ setEditor(_content,_rawLang); applyLayout(); });
  }
  // Preview pane is needed for rendered and side.
  if(_viewMode==='rendered'||_viewMode==='side'){
    if(_rendered){ el('img-el').src=_rendered; applyLayout(); }
    else if(_lang==='markdown'||_lang==='md'){ ensureMarked(function(){ renderMarkdownBlocks(_content); applyLayout(); }); }
    else { renderPlain(_content); applyLayout(); }
  }
  applyLayout();
}

function ensureMonaco(cb){
  if(_monacoLoaded){cb();return;}
  _pendingMonaco=cb;
  if(document.getElementById('__monaco_loader')){return;}
  var s=document.createElement('script');
  s.id='__monaco_loader';
  s.src='./vs/loader.js';
  s.onerror=function(){ /* fall back to plain text in the editor div */
    el('editor').textContent=_content; _monacoLoaded=false;
    var cb2=_pendingMonaco;_pendingMonaco=null;if(cb2)cb2();
  };
  s.onload=function(){
    require.config({paths:{vs:'./vs'}});
    require(['vs/editor/editor.main'],function(){
      _monacoLoaded=true;
      var cb2=_pendingMonaco;_pendingMonaco=null;if(cb2)cb2();
    });
  };
  document.head.appendChild(s);
}

function ensureMarked(cb){
  // marked is loaded eagerly in <head> (before Monaco's AMD loader), so the global is normally
  // ready. Fall back to a lazy load with `define` temporarily hidden so its UMD still attaches to
  // the global even if Monaco's loader already defined `define`.
  if(typeof marked!=='undefined'){_markedLoaded=true;cb();return;}
  if(_markedLoaded){cb();return;}
  _pendingMarked=cb;
  if(document.getElementById('__marked_loader')){return;}
  var savedDefine=window.define;
  window.define=undefined;
  var s=document.createElement('script');
  s.id='__marked_loader';
  s.src='./marked.min.js';
  s.onerror=function(){
    window.define=savedDefine;
    el('md-view').innerHTML='<pre style="color:#f57c7c;padding:12px">Failed to load markdown renderer.</pre>';
    var cb2=_pendingMarked;_pendingMarked=null;if(cb2)cb2();
  };
  s.onload=function(){
    window.define=savedDefine;
    _markedLoaded=true;
    var cb2=_pendingMarked;_pendingMarked=null;if(cb2)cb2();
  };
  document.head.appendChild(s);
}

// ---- editor (raw source) ------------------------------------------------

function setEditor(content,lang){
  if(!_editor){
    _editor=monaco.editor.create(el('editor'),{
      value:content,language:mapLang(lang),
      readOnly:true,theme:'vs-dark',
      minimap:{enabled:false},scrollBeyondLastLine:false,
      fontSize:_fontSize,fontFamily:"'SF Mono',Menlo,Monaco,monospace",
      lineNumbers:'on',lineNumbersMinChars:4,automaticLayout:true,wordWrap:'off',
      contextmenu:false,overviewRulerLanes:0,
      scrollbar:{verticalScrollbarSize:6,horizontalScrollbarSize:6}
    });
    _editor.onDidChangeCursorPosition(function(ev){
      if(_suppressMonacoSync||_viewMode==='raw')return;
      _currentLine=ev.position.lineNumber;
      highlightCurrentBlock();
      postCursorLine();
    });
    setEditorCursor();
    _editor.focus();
    return;
  }
  var old=_editor.getModel();
  var m=monaco.editor.createModel(content,mapLang(lang));
  _editor.setModel(m);
  _editor.updateOptions({lineNumbers:'on',lineNumbersMinChars:4});
  if(old)old.dispose();
  setEditorCursor();
}

function setEditorCursor(){
  if(!_editor)return;
  _suppressMonacoSync=true;
  _editor.setPosition({lineNumber:_currentLine,column:1});
  _editor.revealLineInCenterIfOutsideViewport(_currentLine);
  _suppressMonacoSync=false;
}

// ---- markdown preview with source-line blocks ---------------------------

function renderMarkdownBlocks(content){
  var view=el('md-view');
  view.innerHTML='';
  _blockLines=[];
  // Strip a leading YAML front-matter block (--- … ---) so it isn't rendered as body text (matching
  // GitHub / VS Code / Obsidian). Keep its line count as an offset so the source-line caret still
  // maps to the raw editor's line numbers, which include the front matter.
  var lineOffset=0;
  var fm=content.match(/^---[ \t]*\r?\n[\s\S]*?\r?\n---[ \t]*(?:\r?\n|$)/);
  if(fm){
    lineOffset=(fm[0].match(/\n/g)||[]).length;
    content=content.slice(fm[0].length);
  }
  var tokens;
  try{ tokens=marked.lexer(content); }
  catch(e){ view.innerHTML=marked.parse(content); return; }
  var line=1+lineOffset;
  for(var i=0;i<tokens.length;i++){
    var tok=tokens[i];
    var startLine=line;
    var raw=tok.raw||'';
    line+=(raw.match(/\n/g)||[]).length;
    if(tok.type==='space')continue;
    var div=document.createElement('div');
    div.className='md-block';
    div.setAttribute('data-line',String(startLine));
    try{
      var single=[tok]; single.links=tokens.links||{};
      div.innerHTML=marked.parser(single);
    }catch(e2){ div.textContent=raw; }
    view.appendChild(div);
    _blockLines.push({el:div,line:startLine});
  }
  highlightCurrentBlock();
}

function renderPlain(content){
  var view=el('md-view');
  _blockLines=[];
  var pre=document.createElement('pre');
  pre.className='plain-view';
  pre.textContent=content;
  view.innerHTML='';
  view.appendChild(pre);
}

function currentBlockIndex(){
  var idx=0;
  for(var i=0;i<_blockLines.length;i++){ if(_blockLines[i].line<=_currentLine)idx=i; else break; }
  return idx;
}

function highlightCurrentBlock(){
  if(!_blockLines.length)return;
  var idx=currentBlockIndex();
  for(var i=0;i<_blockLines.length;i++){ _blockLines[i].el.classList.toggle('md-caret',i===idx); }
  var target=_blockLines[idx].el;
  if(target.scrollIntoViewIfNeeded)target.scrollIntoViewIfNeeded();
  else target.scrollIntoView({block:'nearest'});
}

function movePreviewCaret(delta){
  if(!_blockLines.length)return;
  var idx=Math.min(Math.max(currentBlockIndex()+delta,0),_blockLines.length-1);
  _currentLine=_blockLines[idx].line;
  highlightCurrentBlock();
  postCursorLine();
  if(_viewMode==='side'&&_editor){
    _suppressMonacoSync=true;
    _editor.setPosition({lineNumber:_currentLine,column:1});
    _editor.revealLineInCenterIfOutsideViewport(_currentLine);
    _suppressMonacoSync=false;
  }
}

function postCursorLine(){
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.sourceCursorLine){
    window.webkit.messageHandlers.sourceCursorLine.postMessage({line:_currentLine});
  }
}

function postToNative(name,payload){
  try{
    if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers[name]){
      window.webkit.messageHandlers[name].postMessage(payload||{});
    }
  }catch(_){}
}
function editorWordAtCursor(){
  if(!_editor)return '';
  var pos=_editor.getPosition();if(!pos)return '';
  var model=_editor.getModel();if(!model)return '';
  var w=model.getWordAtPosition(pos);
  return (w&&w.word)?w.word:'';
}
// Code-navigation shortcuts on the raw source editor (Cmd+B find usages, Cmd+↓ go to declaration).
// Only fire when Monaco holds focus (raw/side modes); the native key monitor covers the other panes.
document.addEventListener('keydown',function(e){
  if(e.altKey&&!e.metaKey&&!e.ctrlKey&&e.key==='Tab'){
    postToNative('cycleFileTab',{delta:e.shiftKey?-1:1});
    e.preventDefault();e.stopPropagation();return;
  }
  if(e.metaKey&&e.shiftKey&&!e.altKey&&!e.ctrlKey&&(e.key==='ArrowLeft'||e.key==='ArrowRight')){
    postToNative('cycleFileTab',{delta:e.key==='ArrowLeft'?-1:1});
    e.preventDefault();e.stopPropagation();return;
  }
  if(!_editor||!_editor.hasTextFocus||!_editor.hasTextFocus())return;
  if(e.metaKey&&(e.key==='b'||e.key==='B')){
    var wb=editorWordAtCursor();
    if(wb)postToNative('findUsages',{word:wb});
    e.preventDefault();e.stopPropagation();return;
  }
  if(e.metaKey&&(e.key==='ArrowDown'||e.keyCode===40)){
    var wd=editorWordAtCursor();
    if(wd)postToNative('goToDeclaration',{word:wd});
    e.preventDefault();e.stopPropagation();return;
  }
},true);

// Arrow keys drive the preview caret in rendered mode, and in side mode when Monaco isn't focused.
window.addEventListener('keydown',function(e){
  if(_viewMode==='raw')return;
  if(el('md-view').style.display==='none')return;
  if(!_blockLines.length)return;
  if(_viewMode==='side'&&_editor&&_editor.hasTextFocus&&_editor.hasTextFocus())return;
  if(e.key==='ArrowDown'){ movePreviewCaret(1); e.preventDefault(); }
  else if(e.key==='ArrowUp'){ movePreviewCaret(-1); e.preventDefault(); }
});

var LANG={
  swift:'swift',js:'javascript',javascript:'javascript',jsx:'javascript',
  ts:'typescript',typescript:'typescript',tsx:'typescript',
  py:'python',python:'python',rs:'rust',rust:'rust',
  go:'go',java:'java',kt:'kotlin',kotlin:'kotlin',scala:'scala',
  c:'c',cpp:'cpp',cc:'cpp',cxx:'cpp',h:'cpp',hpp:'cpp',
  cs:'csharp',csharp:'csharp',
  css:'css',scss:'scss',less:'less',
  html:'html',xml:'xml',svg:'xml',json:'json',
  yaml:'yaml',yml:'yaml',toml:'ini',ini:'ini',conf:'ini',
  sh:'shell',bash:'shell',zsh:'shell',fish:'shell',
  sql:'sql',rb:'ruby',ruby:'ruby',php:'php',
  r:'r',dart:'dart',lua:'lua',
  dockerfile:'dockerfile',makefile:'makefile',
  markdown:'markdown',md:'markdown',
  txt:'plaintext',text:'plaintext',log:'plaintext',csv:'plaintext',tsv:'plaintext'
};
function mapLang(l){return LANG[l]||'plaintext';}
</script>
</body>
</html>
