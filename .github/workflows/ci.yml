name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-smoke:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain versions
        run: |
          swift --version
          node --version

      # build.sh downloads libghostty from a pinned GitHub release (checksum-verified)
      # into .build/vendor, so no extra setup is needed on the runner.
      - name: Build
        run: ./scripts/build.sh

      # launch-smoke and key-input-smoke boot AppKit windows, so they are skipped on the
      # headless runner. The aggregate runner fails fast in CI and gives each smoke a
      # bounded runtime so a single hang cannot consume the whole job timeout.
      - name: Smoke suite
        run: SMOKE_SKIP="launch-smoke.sh key-input-smoke.sh" SMOKE_FAIL_FAST=1 SMOKE_TIMEOUT_SECONDS=600 ./scripts/smoke-all.sh
