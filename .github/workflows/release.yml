name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  dmg:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain versions
        run: |
          swift --version
          node --version
          gh --version

      - name: Build
        run: ./scripts/build.sh

      - name: Smoke suite
        run: SMOKE_SKIP="launch-smoke.sh key-input-smoke.sh" SMOKE_FAIL_FAST=1 SMOKE_TIMEOUT_SECONDS=600 ./scripts/smoke-all.sh

      - name: Build DMG
        id: package
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          dmg_path="$(./scripts/package-dmg.sh)"
          release_dmg=".build/Momenterm-${version}.dmg"
          cp "$dmg_path" "$release_dmg"
          shasum -a 256 "$release_dmg" > "$release_dmg.sha256"
          echo "dmg=$release_dmg" >> "$GITHUB_OUTPUT"
          echo "checksum=$release_dmg.sha256" >> "$GITHUB_OUTPUT"

      - name: Verify release version and signature
        run: |
          version="${GITHUB_REF_NAME#v}"
          bundle_version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' .build/Momenterm.app/Contents/Info.plist)"
          test "$bundle_version" = "$version"
          /usr/bin/codesign --verify --deep --strict .build/Momenterm.app

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$GITHUB_REF_NAME"
          version="${tag#v}"
          title="Momenterm ${version}"
          notes="Download Momenterm-${version}.dmg and drag Momenterm.app to Applications."
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" \
              "${{ steps.package.outputs.dmg }}" \
              "${{ steps.package.outputs.checksum }}" \
              --clobber
          else
            gh release create "$tag" \
              "${{ steps.package.outputs.dmg }}" \
              "${{ steps.package.outputs.checksum }}" \
              --title "$title" \
              --notes "$notes"
          fi
